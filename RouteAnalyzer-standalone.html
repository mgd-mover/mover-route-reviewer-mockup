  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ate(s => ({ cfg: { ...s.cfg, ...(s.draftCfg || {}) }, settingsOpen: false, draftCfg: null }), () => {\n      this._unsched = null;\n      this.setState({ review: this.computeReview() });\n    });\n  }\n  resetCfg(){\n    // stage defaults (still applied on Done)\n    this.setState({ draftCfg: { speedSlow:30, speedFast:60, stopWindow:240, stopDistance:150, stopShortMax:120, stopMediumMax:300, schedSuppress:300, stopTotalWarnMin:15, stopTotalCritMin:30, routeDistWarnPct:10, routeDistCritPct:20, routeTimeWarnPct:15, routeTimeCritPct:30, twEarlyWarnMin:30, twEarlyCritMin:60, twLateWarnMin:15, twLateCritMin:30, arrivalWindowYellowMin:1, arrivalWindowRedMin:10 } });\n  }\n  tog(name){ this.setState(s => ({ open: { ...s.open, [name]: !s.open[name] } })); }\n  componentDidMount(){\n    if (this.props.startInAnalysis) this.setState({ analyze: true });\n  }\n  onGo(){\n    const rt = (this.state.routeText || '').trim();\n    const pt = (this.state.posText || '').trim();\n    if (!rt) { this.setState({ parseError: 'Paste the route-details JSON in the left box.' }); return; }\n    if (!pt) { this.setState({ parseError: 'Paste the driver-positions JSON in the right box.' }); return; }\n    let r, p;\n    try { r = JSON.parse(rt); } catch (e) { this.setState({ parseError: 'Route-details JSON is invalid — ' + e.message + '. Make sure you pasted the whole file (it should start with { and end with }).' }); return; }\n    try { p = JSON.parse(pt); } catch (e) { this.setState({ parseError: 'Driver-positions JSON is invalid — ' + e.message + '. Check you pasted it into the right box.' }); return; }\n    // tolerate a nested route object\n    if (r && !r.stops && r.route && r.route.stops) r = r.route;\n    if (!r || !Array.isArray(r.stops)) { this.setState({ parseError: 'Route-details JSON has no \"stops\" array — did you paste the driver-positions file into the route box by mistake?' }); return; }\n    try {\n      window.parseRoutePayload(r, p);\n      this._unsched = null;\n      this.setState({ mode: 'details', parseError: '', review: this.computeReview() });\n    } catch (e) {\n      this.setState({ parseError: 'Could not build the route — ' + e.message });\n    }\n  }\n\n  _parseDur(s){ if(!s) return 0; const h=(s.match(/(\\d+)\\s*h/)||[])[1]||0; const m=(s.match(/(\\d+)\\s*m/)||[])[1]||0; return (+h)*60+(+m); }\n  _parseHM(s){ if(!s) return null; const p=String(s).trim().split(':'); if(p.length<2) return null; return (+p[0])*60+(+p[1]); }\n  _hav(a,b){ const R=6371,r=Math.PI/180; const dLat=(b.lat-a.lat)*r, dLng=(b.lng-a.lng)*r; const x=Math.sin(dLat/2)**2+Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLng/2)**2; return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))*1000; }\n\n  // Same unscheduled-stop detection as RouteAnalyser (window-based + gap pass), total seconds only\n  _unschedTotalSec(){\n    const P=(window.DRIVER_PATH||[]).map(r=>({t:r[0],lat:r[1],lng:r[2]}));\n    if(!P.length) return 0;\n    const sched=(window.ROUTE&&window.ROUTE.stops)||[];\n    const c=this.state.cfg;\n    const W=c.stopWindow*1000,MID=c.stopWindow/2*1000,D=c.stopDistance,SHORT=c.stopShortMax;\n    const SUP=(c.schedSuppress!=null?c.schedSuppress:300);\n    const near=(la,ln)=>sched.some(s=>Number.isFinite(s.lat)&&this._hav({lat:la,lng:ln},{lat:s.lat,lng:s.lng})<SUP);\n    const stops=[]; let i=0;\n    while(i<P.length){ const ps=P[i]; let j=i+1; while(j<P.length&&P[j].t<ps.t+W)j++; if(j>=P.length)break; const pe=P[j]; if(pe.t-ps.t>W+30000){i++;continue;} if(this._hav(ps,pe)<D){ let k=i+1; while(k<j&&P[k].t<ps.t+MID)k++; const pm=P[k]; if(this._hav(pm,pe)<D){ const an={lat:(ps.lat+pe.lat)/2,lng:(ps.lng+pe.lng)/2}; if(this._hav(pm,an)<D&&!near(an.lat,an.lng)){ let a=i; while(a>0&&this._hav(P[a-1],an)<D)a--; let b=j; while(b<P.length-1&&this._hav(P[b+1],an)<D)b++; stops.push({s:P[a].t,e:P[b].t,la:an.lat,ln:an.lng}); i=b+1; continue; } } } i++; }\n    for(let m=1;m<P.length;m++){ const gap=(P[m].t-P[m-1].t)/1000; if(gap<SHORT)continue; if(this._hav(P[m-1],P[m])>=D)continue; if(stops.some(s=>P[m-1].t>=s.s&&P[m].t<=s.e+60000))continue; if(near(P[m].lat,P[m].lng))continue; stops.push({s:P[m-1].t,e:P[m].t,la:P[m].lat,ln:P[m].lng}); }\n    this._unsched = stops.map(x=>({ startMin:this._msToMin(x.s), startMs:x.s, durSec:(x.e-x.s)/1000, lat:x.la, lng:x.ln }));\n    return this._unsched.reduce((t,x)=>t+x.durSec,0);\n  }\n  _msToMin(ms){ const s=new Date(ms).toLocaleTimeString('en-GB',{timeZone:'Europe/Copenhagen',hour:'2-digit',minute:'2-digit'}); return this._parseHM(s); }\n  _unschedStops(){ this._unschedTotalSec(); return this._unsched || []; }\n\n  // Per-stop planned/actual driving & task minutes from the timeline segments (24px = 5 min)\n  _segPairs(){\n    const R=window.ROUTE||{}, mpp=5/24;\n    const parse=(arr)=>{ const drive={}, task={}; let lastDrive=0;\n      (arr||[]).forEach(s=>{ if(s[1]===1) lastDrive=s[0]*mpp; else if(s[1]===2){ const n=s[2]; task[n]=s[0]*mpp; drive[n]=lastDrive; lastDrive=0; } });\n      return { drive, task };\n    };\n    const P=parse(R.plannedRaw), A=parse(R.actualRaw);\n    const taskStats=[], driveStats=[];\n    Object.keys(P.task).forEach(n=>{\n      const et=P.task[n], at=A.task[n];\n      if(et!=null && at!=null) taskStats.push({ ratio:(et+5)/(at+5), expected:et, actual:at });\n      const ed=P.drive[n], ad=A.drive[n];\n      if(ed>0 && ad>0) driveStats.push({ ratio:ed/ad, expected:ed, actual:ad });\n    });\n    return { taskStats, driveStats };\n  }\n  // Bayesian category — exact port of RouteAnalyser calculateBayesianCategory\n  _bayes(items, type){\n    if(!items || !items.length) return '--';\n    items.sort((a,b)=>a.ratio-b.ratio);\n    const f = items.length>2 ? items.slice(2) : items;\n    const se=f.reduce((a,i)=>a+i.expected,0), sa=f.reduce((a,i)=>a+i.actual,0);\n    if(sa===0) return '--';\n    const nr=se/sa;\n    if(type==='traffic'){ if(nr>0.95) return 'Low'; if(nr>=0.90) return 'Moderate'; if(nr>=0.75) return 'High'; return 'Very High'; }\n    if(nr>1.075) return 'Fast'; if(nr>=0.925) return 'Normal'; if(nr>=0.85) return 'Slow'; return 'Very Slow';\n  }\n\n  // Overall review status — mirrors RouteAnalyser: red>0 || yellow>=4 => Review required\n  computeReview(){\n    const R=window.ROUTE||{}, info=R.info||{}, stops=R.stops||[];\n    const c=this.state.cfg;\n    let red=0, yellow=0; const reasons=[];\n    const add=(level,cat,text)=>{ reasons.push({level,cat,text}); if(level==='red')red++; else yellow++; };\n    // Route efficiency — distance & time variance\n    const pd=parseFloat(info.plannedDistance), ad=parseFloat(info.actualDistance);\n    if(pd>0){ const v=(ad-pd)/pd*100; if(v>=c.routeDistCritPct)add('red','Distance','Actual distance +'+v.toFixed(0)+'% over plan'); else if(v>=c.routeDistWarnPct)add('yellow','Distance','Actual distance +'+v.toFixed(0)+'% over plan'); }\n    const pt=this._parseDur(info.plannedDuration), at=this._parseDur(info.actualDuration);\n    if(pt>0){ const v=(at-pt)/pt*100; if(v>=c.routeTimeCritPct)add('red','Duration','Actual duration +'+v.toFixed(0)+'% over plan'); else if(v>=c.routeTimeWarnPct)add('yellow','Duration','Actual duration +'+v.toFixed(0)+'% over plan'); }\n    // Time-window compliance + outside-window per stop\n    stops.forEach(s=>{\n      const arr=this._parseHM(s.arrival); if(arr==null||!s.timeframe) return;\n      const parts=s.timeframe.split(/[–-]/).map(x=>this._parseHM(x)); const from=parts[0], to=parts[1];\n      if(from==null||to==null) return;\n      if(arr<from){ const e=from-arr; if(e>=c.twEarlyCritMin)add('red','Time window','Stop '+s.n+' arrived '+e+' min early'); else if(e>=c.twEarlyWarnMin)add('yellow','Time window','Stop '+s.n+' arrived '+e+' min early'); }\n      else if(arr>to){ const l=arr-to; if(l>=c.twLateCritMin)add('red','Time window','Stop '+s.n+' arrived '+l+' min late'); else if(l>=c.twLateWarnMin)add('yellow','Time window','Stop '+s.n+' arrived '+l+' min late'); }\n      if(arr<from||arr>to){ const d=arr<from?from-arr:arr-to; if(d>=c.arrivalWindowRedMin)add('red','Outside window','Stop '+s.n+' '+d+' min outside window'); else if(d>=c.arrivalWindowYellowMin)add('yellow','Outside window','Stop '+s.n+' '+d+' min outside window'); }\n    });\n    // Unscheduled stop total time\n    const us=this._unschedTotalSec();\n    const fmtMin=(m)=>{ m=Math.round(m); const h=Math.floor(m/60), mm=m%60; return h>0?(h+' h, '+mm+' m'):(mm+' m'); };\n    if(us>=c.stopTotalCritMin*60)add('red','Unscheduled','Total unscheduled time '+fmtMin(us/60)); else if(us>=c.stopTotalWarnMin*60)add('yellow','Unscheduled','Total unscheduled time '+fmtMin(us/60));\n    let status='No abnormalities found', level='green';\n    if(red>0||yellow>=4){ status='Review required'; level='red'; }\n    else if(yellow>0){ status='Review recommended'; level='yellow'; }\n    reasons.sort((a,b)=> (a.level===b.level?0:(a.level==='red'?-1:1)));\n    return { status, level, red, yellow, reasons };\n  }\n  // Per-stop delta (actual − estimated) of driving time & task time, in minutes\n  computeHistogram(){\n    const R=window.ROUTE||{}, mpp=5/24;\n    const parse=(arr)=>{ const drive={}, task={}; let ld=0;\n      (arr||[]).forEach(s=>{ if(s[1]===1) ld=s[0]*mpp; else if(s[1]===2){ task[s[2]]=s[0]*mpp; drive[s[2]]=ld; ld=0; } });\n      return { drive, task };\n    };\n    const P=parse(R.plannedRaw), A=parse(R.actualRaw);\n    const stops=R.stops||[];\n    // Attribute each detected unscheduled stop to the leg arriving at a scheduled stop (by time)\n    const arrivals = stops.map(s=>this._parseHM(s.arrival));\n    const unschedByStop = {};\n    (this._unschedStops()).forEach(u=>{\n      let idx = arrivals.findIndex(a => a!=null && a >= u.startMin);\n      if(idx < 0) idx = stops.length - 1;\n      unschedByStop[stops[idx].n] = (unschedByStop[stops[idx].n] || 0) + u.durSec/60;\n    });\n    const rows = stops.map(s=>{\n      const n=s.n;\n      const pt=P.task[n]??null, at=A.task[n]??null;\n      const pd=P.drive[n]??null, ad=A.drive[n]??null;\n      const taskDelta = (pt!=null&&at!=null) ? Math.round(at-pt) : null;\n      const driveHas = (pd!=null||ad!=null) && (pd>0||ad>0);\n      const driveDelta = driveHas ? Math.round((ad||0)-(pd||0)) : null;\n      let timeliness='On Time';\n      const arr=this._parseHM(s.arrival);\n      const c=this.state.cfg;\n      if(arr!=null && s.timeframe){ const p=s.timeframe.split(/[–-]/).map(x=>this._parseHM(x)); if(p[0]!=null&&p[1]!=null){\n        if(arr<p[0]){ const e=p[0]-arr; if(e>=(c.twEarlyCritMin!=null?c.twEarlyCritMin:60)) timeliness='Too Early'; else if(e>=(c.twEarlyWarnMin!=null?c.twEarlyWarnMin:30)) timeliness='Early'; }\n        else if(arr>p[1]){ const l=arr-p[1]; if(l>=(c.twLateCritMin!=null?c.twLateCritMin:30)) timeliness='Too Late'; else if(l>=(c.twLateWarnMin!=null?c.twLateWarnMin:15)) timeliness='Late'; }\n      } }\n      const tlC = { 'On Time':{bg:'#E7F6EF',fg:'#0B7A48'}, 'Early':{bg:'#FBF4E4',fg:'#8A6410'}, 'Too Early':{bg:'#FDECEC',fg:'#C42A2E'}, 'Late':{bg:'#FBF4E4',fg:'#8A6410'}, 'Too Late':{bg:'#FDECEC',fg:'#C42A2E'} }[timeliness];\n      const unschedMin = unschedByStop[n] ? Math.round(unschedByStop[n]) : 0;\n      return { n, typeLabel:s.typeLabel||'Delivery', timeliness, tlBg:tlC.bg, tlFg:tlC.fg, driveDelta, taskDelta, unschedMin,\n               onGo:()=>this.gotoStop(s.arrival, s.lat, s.lng) };\n    });\n    const maxAbs = Math.max(1, ...rows.flatMap(r=>[Math.abs(r.driveDelta||0), Math.abs(r.taskDelta||0), r.unschedMin||0]));\n    const H=90;\n    const px = v => Math.max(3, Math.round(Math.abs(v)/maxAbs*H));\n    const bar = (v, color, labelColor) => {\n      if(v==null) return { upH:'0px', downH:'0px', upLabel:'', downLabel:'', color, labelColor };\n      const up = v>=0, h = px(v)+'px';\n      return { upH: up?h:'0px', downH: up?'0px':h, upLabel: up?String(v):'', downLabel: up?'':String(v), color, labelColor };\n    };\n    return rows.map(r=>({ n:r.n, typeLabel:r.typeLabel, timeliness:r.timeliness, tlBg:r.tlBg, tlFg:r.tlFg, onGo:r.onGo,\n      d: bar(r.driveDelta, '#1
