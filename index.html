document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

en choose how to open the analysis.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- How-to guide (collapsible) -->\n        <div style=\"margin-top:22px; background:#fff; border:1px solid #E3E9F2; border-radius:16px; box-shadow:0 1px 2px rgba(21,87,185,0.04); overflow:hidden; animation:guideIn 480ms cubic-bezier(0.22,1,0.36,1) both;\">\n          <div class=\"rd-guidehead\" sc-camel-on-click=\"{{ toggleGuide }}\" style=\"display:flex; align-items:center; gap:14px; padding:16px 18px; cursor:pointer; user-select:none; transition:background 140ms;\">\n            <span style=\"flex:0 0 auto; width:40px; height:40px; border-radius:10px; background:#EDF3FD; color:#1769DB; display:inline-flex; align-items:center; justify-content:center;\">\n              <svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 19.5A2.5 2.5 0 0 1 6.5 17H20\"><\u002Fpath><path d=\"M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z\"><\u002Fpath><\u002Fsvg>\n            <\u002Fspan>\n            <div style=\"flex:1; min-width:0;\">\n              <div style=\"font-size:16px; font-weight:700; color:#041225;\">How to export a route and open it here<\u002Fdiv>\n              <div style=\"font-size:13px; color:#68717C; margin-top:2px;\">A 6-step walkthrough — from the TMS route page to your analysis.<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"flex:0 0 auto; display:inline-flex; align-items:center; gap:10px;\">\n              <span style=\"font-size:12px; font-weight:600; color:#68717C; padding:3px 10px; border-radius:9999px; background:#F2F4FA;\">6 steps<\u002Fspan>\n              <span style=\"display:inline-flex; transition:transform 320ms cubic-bezier(0.22,1,0.36,1); transform:rotate({{ guideCaret }}); color:#68717C;\">\n                <svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n              <\u002Fspan>\n            <\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-rows:{{ guideRows }}; transition:grid-template-rows 380ms cubic-bezier(0.22,1,0.36,1);\">\n            <div style=\"overflow:hidden; min-height:0;\">\n              <div style=\"padding:6px 18px 22px; display:flex; flex-direction:column; gap:8px;\">\n\n                <div class=\"rd-step\" style=\"display:flex; gap:18px; padding:16px 0; border-top:1px solid #EEF1F6; animation-delay:60ms;\">\n                  <div style=\"flex:0 0 268px; max-width:268px;\">\n                    <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:8px;\"><span style=\"width:26px; height:26px; border-radius:9999px; background:#021C38; color:#fff; font-size:13px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; font-family:'Geist Mono',monospace;\">1<\u002Fspan><span style=\"font-size:15px; font-weight:700; color:#041225;\">Open the route in TMS<\u002Fspan><\u002Fdiv>\n                    <div style=\"font-size:13px; line-height:1.6; color:#68717C;\">In the Mover platform, open the route you want to analyze. You'll land on its standard <strong style=\"color:#041225; font-weight:600;\">Route Details<\u002Fstrong> page.<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex:1; min-width:0;\"><img src=\"2380763e-b344-470a-b661-cc15d8a22efc\" alt=\"Route Details page in TMS\" style=\"width:100%; height:auto; display:block; border:1px solid #E3E9F2; border-radius:10px;\"><\u002Fdiv>\n                <\u002Fdiv>\n\n                <div class=\"rd-step\" style=\"display:flex; gap:18px; padding:16px 0; border-top:1px solid #EEF1F6; animation-delay:120ms;\">\n                  <div style=\"flex:0 0 268px; max-width:268px;\">\n                    <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:8px;\"><span style=\"width:26px; height:26px; border-radius:9999px; background:#021C38; color:#fff; font-size:13px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; font-family:'Geist Mono',monospace;\">2<\u002Fspan><span style=\"font-size:15px; font-weight:700; color:#041225;\">Add the export flag<\u002Fspan><\u002Fdiv>\n                    <div style=\"font-size:13px; line-height:1.6; color:#68717C;\">Click into the address bar and append <span style=\"font-family:'Geist Mono',monospace; font-size:12px; background:#FFF7E6; color:#7A5B12; padding:1px 6px; border-radius:5px; border:1px solid #F1DFB0;\">&amp;exportRoute<\u002Fspan> to the end of the route URL, then press Enter.<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex:1; min-width:0;\"><img src=\"87d9e08a-a583-469f-aa3a-b4b66477efc6\" alt=\"Append &amp;exportRoute to the URL\" style=\"width:100%; height:auto; display:block; border:1px solid #E3E9F2; border-radius:10px;\"><\u002Fdiv>\n                <\u002Fdiv>\n\n                <div class=\"rd-step\" style=\"display:flex; gap:18px; padding:16px 0; border-top:1px solid #EEF1F6; animation-delay:180ms;\">\n                  <div style=\"flex:0 0 268px; max-width:268px;\">\n                    <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:8px;\"><span style=\"width:26px; height:26px; border-radius:9999px; background:#021C38; color:#fff; font-size:13px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; font-family:'Geist Mono',monospace;\">3<\u002Fspan><span style=\"font-size:15px; font-weight:700; color:#041225;\">Wait for the download<\u002Fspan><\u002Fdiv>\n                    <div style=\"font-size:13px; line-height:1.6; color:#68717C;\">Export runs and after a few seconds a <span style=\"font-family: &quot;Geist Mono&quot;, monospace; font-size: 12px;\">route-&lt;id&gt;.json<\u002Fspan> file downloads automatically.<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex:1; min-width:0;\"><img src=\"f11c1d2f-c8fa-4f0f-a4f3-79517a6f21ce\" alt=\"route JSON file downloaded\" style=\"width:100%; height:auto; display:block; border:1px solid #E3E9F2; border-radius:10px;\"><\u002Fdiv>\n                <\u002Fdiv>\n\n                <div class=\"rd-step\" style=\"display:flex; gap:18px; padding:16px 0; border-top:1px solid #EEF1F6; animation-delay:240ms;\">\n                  <div style=\"flex:0 0 268px; max-width:268px;\">\n                    <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:8px;\"><span style=\"width:26px; height:26px; border-radius:9999px; background:#021C38; color:#fff; font-size:13px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; font-family:'Geist Mono',monospace;\">4<\u002Fspan><span style=\"font-size:15px; font-weight:700; color:#041225;\">Drop it into Route Analyzer<\u002Fspan><\u002Fdiv>\n                    <div style=\"font-size:13px; line-height:1.6; color:#68717C;\">Drag &amp; drop the downloaded <span style=\"font-family:'Geist Mono',monospace; font-size:12px;\">.json<\u002Fspan> onto the drop zone below — or click it to browse.<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex:1; min-width:0;\"><img src=\"9db3acb1-4cb1-430b-ad6d-e6816a7c8a64\" alt=\"Drag &amp; drop the file into Route Analyzer\" style=\"width:100%; height:auto; display:block; border:1px solid #E3E9F2; border-radius:10px;\"><\u002Fdiv>\n                <\u002Fdiv>\n\n                <div class=\"rd-step\" style=\"display:flex; gap:18px; padding:16px 0; border-top:1px solid #EEF1F6; animation-delay:300ms;\">\n                  <div style=\"flex:0 0 268px; max-width:268px;\">\n                    <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:8px;\"><span style=\"width:26px; height:26px; border-radiu 2Fdiv>\n        <\u002Fsc-if>\n\n        <!-- Secondary: paste the two payloads manually (collapsible) -->\n        <button sc-camel-on-click=\"{{ togglePaste }}\" style=\"display:inline-flex; align-items:center; gap:8px; margin-top:18px; background:transparent; border:none; padding:4px 0; cursor:pointer; font-size:14px; font-weight:600; color:#68717C;\">\n          <span style=\"display:inline-flex; transition:transform 140ms; transform:rotate({{ pasteCaretDeg }});\">\n            <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 18 15 12 9 6\"><\u002Fpolyline><\u002Fsvg>\n          <\u002Fspan>\n          Or paste the two payloads manually\n        <\u002Fbutton>\n        <sc-if value=\"{{ pasteOpen }}\">\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:12px;\">\n            <div style=\"display:flex; flex-direction:column; gap:8px;\">\n              <label style=\"font-size:13px; font-weight:600; color:#041225;\">Route details JSON<\u002Flabel>\n              <textarea class=\"rd-scroll\" value=\"{{ routeText }}\" sc-camel-on-input=\"{{ onRouteInput }}\" spellcheck=\"false\" placeholder=\"Paste the route-details payload here…\" style=\"height:280px; resize:vertical; padding:12px 14px; border:1px solid #D5DFEC; border-radius:12px; background:#fff; font-family:'Geist Mono',monospace; font-size:12px; line-height:1.5; color:#041225; outline:none;\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:8px;\">\n              <label style=\"font-size:13px; font-weight:600; color:#041225;\">Driver positions JSON<\u002Flabel>\n              <textarea class=\"rd-scroll\" value=\"{{ posText }}\" sc-camel-on-input=\"{{ onPosInput }}\" spellcheck=\"false\" placeholder=\"Paste the driver-positions payload here…\" style=\"height:280px; resize:vertical; padding:12px 14px; border:1px solid #D5DFEC; border-radius:12px; background:#fff; font-family:'Geist Mono',monospace; font-size:12px; line-height:1.5; color:#041225; outline:none;\"><\u002Ftextarea>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ parseError }}\">\n          <div style=\"margin-top:14px; padding:12px 14px; border:1px solid #F3C7C8; background:#FDECEC; color:#C42A2E; border-radius:10px; font-size:13px;\">{{ parseError }}<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"margin-top:26px; font-size:13px; font-weight:700; letter-spacing:0.4px; text-transform:uppercase; color:#9BA0A8;\">Choose how to open the analysis<\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:12px;\">\n          <button sc-camel-on-click=\"{{ onGo }}\" class=\"rd-optcard\" style=\"text-align:left; background:#fff; border:1px solid #D5DFEC; border-radius:14px; padding:22px; cursor:pointer; display:flex; flex-direction:column; gap:14px; min-height:220px;\">\n            <span style=\"width:44px; height:44px; border-radius:10px; background:#EDF3FD; color:#1769DB; display:inline-flex; align-items:center; justify-content:center;\">\n              <svg width=\"24\" height=\"24\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><path d=\"M3 9h18\"><\u002Fpath><path d=\"M9 21V9\"><\u002Fpath><\u002Fsvg>\n            <\u002Fspan>\n            <div style=\"flex:1;\">\n              <div style=\"font-size:17px; font-weight:700; color:#041225; margin-bottom:6px;\">Integrated in Route Details<\u002Fdiv>\n              <div style=\"font-size:13px; line-height:1.55; color:#68717C;\">The current view. KPIs, the review flag, map, speed heat, timeline and deviation histogram all live together on the Route Details page – nothing is split off.<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"display:inline-flex; align-items:center; gap:7px; font-size:14px; font-weight:600; color:#1769DB;\">Open Route Details <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"m12 5 7 7-7 7\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <\u002Fbutton>\n          <button sc-camel-on-click=\"{{ onGoReviewer }}\" class=\"rd-optcard\" style=\"text-align:left; background:#fff; border:1px solid #D5DFEC; border-radius:14px; padding:22px; cursor:pointer; display:flex; flex-direction:column; gap:14px; min-height:220px;\">\n            <span style=\"width:44px; height:44px; border-radius:10px; background:#FBECEC; color:#C42A2E; display:inline-flex; align-items:center; justify-content:center;\">\n              <svg width=\"24\" height=\"24\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z\"><\u002Fpath><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"><\u002Fline><\u002Fsvg>\n            <\u002Fspan>\n            <div style=\"flex:1;\">\n              <div style=\"font-size:17px; font-weight:700; color:#041225; margin-bottom:6px;\">Separate Route Reviewer page<\u002Fdiv>\n              <div style=\"font-size:13px; line-height:1.55; color:#68717C;\">Keep Route Details clean. Deviations, traffic and work-rate move into a dedicated Route Reviewer tab – with a summary flag in the info panel and a must-justify deviation list.<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"display:inline-flex; align-items:center; gap:7px; font-size:14px; font-weight:600; color:#1769DB;\">Open Route Reviewer <svg  text-align:right;\"><span style=\"font-size:12px; color:#9BA0A8; width:38px;\">sec<\u002Fspan><\u002Fspan><\u002Flabel>\n                    <label style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; padding:7px 0; font-size:13px; color:#4F5966;\"><span>Scheduled-stop suppression<\u002Fspan><span style=\"display:inline-flex; align-items:center; gap:6px;\"><input type=\"number\" value=\"{{ cfg.schedSuppress }}\" sc-camel-on-input=\"{{ cfgSet.schedSuppress }}\" style=\"width:74px; height:32px; padding:0 8px; border:1px solid #D5DFEC; border-radius:8px; font-size:13px; font-family:'Geist Mono',monospace; color:#041225; text-align:right;\"><span style=\"font-size:12px; color:#9BA0A8; width:38px;\">m<\u002Fspan><\u002Fspan><\u002Flabel>\n                    <label style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; padding:7px 0; font-size:13px; color:#4F5966;\"><span>Total warning<\u002Fspan><span style=\"display:inline-flex; align-items:center; gap:6px;\"><input type=\"number\" value=\"{{ cfg.stopTotalWarnMin }}\" sc-camel-on-input=\"{{ cfgSet.stopTotalWarnMin }}\" style=\"width:74px; height:32px; padding:0 8px; border:1px solid #D5DFEC; border-radius:8px; font-size:13px; font-family:'Geist Mono',monospace; color:#041225; text-align:right;\"><span style=\"font-size:12px; color:#9BA0A8; width:38px;\">min<\u002Fspan><\u002Fspan><\u002Flabel>\n                    <label style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; padding:7px 0; font-size:13px; color:#4F5966;\"><span>Total critical<\u002Fspan><span style=\"display:inline-flex; align-items:center; gap:6px;\"><input type=\"number\" value=\"{{ cfg.stopTotalCritMin }}\" sc-camel-on-input=\"{{ cfgSet.stopTotalCritMin }}\" style=\"width:74px; height:32px; padding:0 8px; border:1px solid #D5DFEC; border-radius:8px; font-size:13px; font-family:'Geist Mono',monospace; color:#041225; text-align:right;\"><span style=\"font-size:12px; color:#9BA0A8; width:38px;\">min<\u002Fspan><\u002Fspan><\u002Flabel>\n\n                    <div style=\"display:flex; align-items:center; gap:6px; margin:20px 0 4px;\"><span style=\"font-size:11px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:#9BA0A8;\">Route review — variance<\u002Fspan><span title=\"Compares the whole route's actual vs planned distance and duration. If the over-run reaches the warning percentage it adds a warning, and the critical percentage adds a critical, to the route review flag.\" style=\"display:inline-flex; width:15px; height:15px; align-items:center; justify-content:center; border-radius:9999px; background:#EDF1F6; color:#68717C; font-size:10px; font-weight:700; font-family:'Geist Mono',monospace; cursor:help;\">i<\u002Fspan><\u002Fdiv>\n                    <label style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; padding:7px 0; font-size:13px; color:#4F5966;\"><span>Distance warning<\u002Fspan><span style=\"display:inline-flex; align-items:center; gap:6px;\"><input type=\"number\" value=\"{{ cfg.routeDistWarnPct }}\" sc-camel-on-input=\"{{ cfgSet.routeDistWarnPct }}\" style=\"width:74px; height:32px; padding:0 8px; border:1px solid #D5DFEC; border-radius:8px; font-size:13px; font-family:'Geist Mono',monospace; color:#041225; text-align:right;\"><span style=\"font-size:12px; color:#9BA0A8; width:38px;\">%<\u002Fspan><\u002Fspan><\u002Flabel>\n                    <label style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; padding:7px 0; font-size:13px; color:#4F5966;\"><span>Distance critical<\u002Fspan><span style=\"display:inline-flex; align-items:center; gap:6px;\"><input type=\"number\" value=\"{{ cfg.routeDistCritPct }}\" sc-camel-on-input=\"{{ cfgSet.routeDistCritPct }}\" style=\"width:74px; height:32px; padding:0 8px; border:1px solid #D5DFEC; border-radius:8px; font-size:13px; font-family:'Geist Mono',monospace; color:#041225; text-align:right;\"><span style=\"font-size:12px; color:#9BA0A8; width:38px;\">%<\u002Fspan><\u002Fspan><\u002Flabel>\n                    <label style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; padding:7px 0; font-size:13px; color:#4F5966;\"><span>Time warning<\u002Fspan><span style=\"display:inline-flex; align-items:center; gap:6px;\"><input type=\"number\" value=\"{{ cfg.routeTimeWarnPct }}\" sc-camel-on-input=\"{{ cfgSet.routeTimeWarnPct }}\" style=\"width:74px; height:32px; padding:0 8px; border:1px solid #D5DFEC; border-radius:8px; font-size:13px; font-family:'Geist Mono',monospace; color:#041225; text-align:right;\"><span style=\"font-size:12px; color:#9BA0A8; width:38px;\">%<\u002Fspan><\u002Fspan><\u002Flabel>\n                    <label style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; padding:7px 0; font-size:13px; color:#4F5966;\"><span>Time critical<\u002Fspan><span style=\"display:inline-flex; align-items:center; gap:6px;\"><input type=\"number\" value=\"{{ cfg.routeTimeCritPct }}\" sc-camel-on-input=\"{{ cfgSet.routeTimeCritPct }}\" style=\"width:74px; height:32px; padding:0 8px; border:1px solid #D5DFEC; border-radius:8px; font-size:13px; font-family:'Geist Mono',monospace; color:#041225; text-align:right;\"><span style=\"font-size:12px; color:#9BA0A8; width:38px;\">%<\u002Fspan><\u002Fspan><\u002Flabel>\n\n                    <div style=\"display:flex; align-items:center; gap:6px; margin:20px 0 4px;\"><span style=\"font-size:11px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:#9BA0A8;\">Route review — time window<\u002Fspan><span title=\"Checks each stop's arrival against its booked time window. Arriving too early or too late by the warning/critical minutes — or outside the window at all — adds warnings/criticals to the route review flag.\" style=\"display:inline-flex; width:15px; height:15px; align-items:center; justify-content:center; border-radius:9999px; background:#EDF1 8; width:38px;\">min<\u002Fspan><\u002Fspan><\u002Flabel>\n                    <label style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; padding:7px 0; font-size:13px; color:#4F5966;\"><span>Late critical<\u002Fspan><span style=\"display:inline-flex; align-items:center; gap:6px;\"><input type=\"number\" value=\"{{ cfg.twLateCritMin }}\" sc-camel-on-input=\"{{ cfgSet.twLateCritMin }}\" style=\"width:74px; height:32px; padding:0 8px; border:1px solid #D5DFEC; border-radius:8px; font-size:13px; font-family:'Geist Mono',monospace; color:#041225; text-align:right;\"><span style=\"font-size:12px; color:#9BA0A8; width:38px;\">min<\u002Fspan><\u002Fspan><\u002Flabel>\n                    <label style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; padding:7px 0; font-size:13px; color:#4F5966;\"><span>Outside window warning<\u002Fspan><span style=\"display:inline-flex; align-items:center; gap:6px;\"><input type=\"number\" value=\"{{ cfg.arrivalWindowYellowMin }}\" sc-camel-on-input=\"{{ cfgSet.arrivalWindowYellowMin }}\" style=\"width:74px; height:32px; padding:0 8px; border:1px solid #D5DFEC; border-radius:8px; font-size:13px; font-family:'Geist Mono',monospace; color:#041225; text-align:right;\"><span style=\"font-size:12px; color:#9BA0A8; width:38px;\">min<\u002Fspan><\u002Fspan><\u002Flabel>\n                    <label style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; padding:7px 0; font-size:13px; color:#4F5966;\"><span>Outside window critical<\u002Fspan><span style=\"display:inline-flex; align-items:center; gap:6px;\"><input type=\"number\" value=\"{{ cfg.arrivalWindowRedMin }}\" sc-camel-on-input=\"{{ cfgSet.arrivalWindowRedMin }}\" style=\"width:74px; height:32px; padding:0 8px; border:1px solid #D5DFEC; border-radius:8px; font-size:13px; font-family:'Geist Mono',monospace; color:#041225; text-align:right;\"><span style=\"font-size:12px; color:#9BA0A8; width:38px;\">min<\u002Fspan><\u002Fspan><\u002Flabel>\n                  <\u002Fdiv>\n\n                  <div style=\"position:sticky; bottom:0; background:#fff; border-top:1px solid #E3E9F2; padding:14px 22px; display:flex; align-items:center; justify-content:space-between; gap:12px;\">\n                    <button sc-camel-on-click=\"{{ resetCfg }}\" style=\"height:36px; padding:0 14px; border-radius:8px; border:1px solid #D5DFEC; background:#fff; color:#4F5966; font-size:13px; font-weight:600; cursor:pointer;\">Reset to defaults<\u002Fbutton>\n                    <button sc-camel-on-click=\"{{ applyCfg }}\" style=\"height:36px; padding:0 18px; border-radius:8px; border:1px solid #1769DB; background:#1769DB; color:#fff; font-size:13px; font-weight:600; cursor:pointer;\">Done<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;analysisLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Analysis mode&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Analysis mode&quot;},&quot;startInAnalysis&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Analysis mode&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#1769DB&quot;,&quot;options&quot;:[&quot;#1769DB&quot;,&quot;#10AA65&quot;,&quot;#021C38&quot;,&quot;#14B6B9&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Analysis mode&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    open: { routeInfo:true, distance:true, contractor:true, driver:true, vehicle:false, payment:false, team:false, instructions:false, tags:false, other:false },\n    kpis: true, map: true, timeline: true, more: false, mapZoom: 1, analyze: false, review: null, settingsOpen: false, reviewOpen: false, infoBar: true,
